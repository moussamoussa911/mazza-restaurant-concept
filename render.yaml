services:
  - type: web
    name: mazza-restaurant-concept
    runtime: static
    buildCommand: echo "Static site ready"
    staticPublishPath: .
    branch: main
    autoDeploy: true
    routes:
      - type: rewrite
        source: /menu
        destination: /menu.html
      - type: rewrite
        source: /reserveren
        destination: /reserveren.html
      - type: rewrite
        source: /over-ons
        destination: /over-ons.html
      - type: rewrite
        source: /privacy
        destination: /privacy.html
